[pytest]
# Pytest configuration for prior-auth-agent test suite

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test directories
testpaths = tests

# Markers (defined in conftest.py)
markers =
    unit: Unit-level tests (Step 1-5 decision logic)
    integration: Integration tests (EHR, database, adapters)
    e2e: End-to-end workflow tests
    edge_case: Edge case scenario tests
    functional: Functional requirement tests (REQ-PA-001 through REQ-PA-010)
    slow: Tests that take significant time (>5 seconds)

# Asyncio configuration
asyncio_mode = auto

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --durations=10
    --color=yes

# Coverage options (if using pytest-cov)
# Uncomment to enable coverage reporting
# addopts = --cov=app --cov-report=html --cov-report=term-missing

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    error
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Minimum version
minversion = 7.0
